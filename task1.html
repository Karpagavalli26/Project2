</head>
<body>
    <div class ="form">
    <form onsubmit="return validateLogin()">
        
        <h1 >Login</h1>
        <div class ="input-box">
            
        <label>Username </label><br>
        <i class="fa fa-user"></i>
        <input type="text" id="username" placeholder="Type your username" ><br>

        <label>Email </label><br>
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Type your Email" ><br>
        <label>Password</label><br>
        <i class="fa fa-lock"></i>
        <input type="password" id="password"  placeholder="Type your password">
       

        <p id ="message" style="color:red;"></p>

         </div>

        <div class="forgot">
            <a href="#" target="_blank">Forgot Password?</a>
        </div>
       
        <button type="submit" class="button">
            LOGIN
        </button>
           
           
            <H5> or sign up with</H5>

            <div class ="social">
                <div class="google">
                <a href="https://accounts.google.com">
                    
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google"></a>
        </div>
        <div class ="twitter">
    <a href="https://twitter.com">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" width="2px" alt="Twitter">
    </a>
    </div>
    <div class="facebook">
    <a href="https://www.facebook.com">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
    </a>
    </div>
            </div>
        
            <h5>
                Or sign up using 
            </h5>
                <div class="sign" >
            <a href="#">SIGN UP</a>
            </div>
    </form>
        
    </div>
    
   <script>
    function validateLogin(){
        let username=document.getElementById("username").value;
        let email=document.getElementById("email").value;
        let password=document.getElementById("password").value;
        let message=document.getElementById("message");
        
         //hardcode Authentication
         let validuser="admin";
        let validemail="admin@gmail.com";
        let validPass="123456";

        //Empty validation
        if(username===""||email===""||password===""){
         message.innerText="All fields are required";
            return false;

        }

        let emailPattern =/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if(!email.match(emailPattern)){
            message.style.color="red";
            message.innerText="Enter a valid email";
            return false;
        }
          //login check
           if(username===validuser&&email===validemail&&password===validPass){
            message.style.color="green";
            message.innerText="Login Success";

           }
           else{
            message.style.color="red";
            message.innerText="Invalid Credentials";
           }
           return false;
     

    }
   </script>
</body>
</html>
